<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>层次分析法(AHP)在线计算工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>层次分析法(AHP)在线计算工具</h1>
            <p class="subtitle">科学决策，从层次分析开始</p>
        </header>

        <section class="input-section">
            <h2>第一步：构建层次结构</h2>
            
            <div class="input-group">
                <label>决策目标：</label>
                <input type="text" id="goal" value="选择最佳旅游目的地" placeholder="请输入决策目标">
            </div>

            <div class="input-group">
                <label>准则层（考虑因素）：</label>
                <div class="criteria-inputs">
                    <input type="text" class="criterion-name" value="景色" placeholder="准则1">
                    <input type="text" class="criterion-name" value="吃住" placeholder="准则2">
                    <input type="text" class="criterion-name" value="价格" placeholder="准则3">
                    <input type="text" class="criterion-name" value="人文" placeholder="准则4">
                </div>
                <button class="btn-small" onclick="addCriterion()">+ 添加准则</button>
            </div>

            <div class="input-group">
                <label>方案层（备选方案）：</label>
                <div class="alternatives-inputs">
                    <input type="text" class="alternative-name" value="南京" placeholder="方案1">
                    <input type="text" class="alternative-name" value="桂林" placeholder="方案2">
                    <input type="text" class="alternative-name" value="三亚" placeholder="方案3">
                </div>
                <button class="btn-small" onclick="addAlternative()">+ 添加方案</button>
            </div>
        </section>

        <section class="matrix-section">
            <h2>第二步：构建判断矩阵</h2>
            <p class="hint">请输入两两比较的相对重要性（1-9标度法）</p>
            
            <div class="matrix-container">
                <h3>准则层判断矩阵</h3>
                <div id="criteria-matrix" class="matrix-table"></div>
            </div>

            <div class="matrix-container">
                <h3>方案层判断矩阵（针对每个准则）</h3>
                <div id="alternatives-matrices"></div>
            </div>
        </section>

        <section class="action-section">
            <button class="btn-primary" onclick="calculateAHP()">
                <span class="btn-icon">▶</span> 运行计算
            </button>
            <button class="btn-secondary" onclick="resetAll()">
                <span class="btn-icon"></span> 重置
            </button>
            <button class="btn-secondary" onclick="loadExample()">
                <span class="btn-icon">★</span> 加载例题
            </button>
        </section>

        <section class="results-section" id="results-section" style="display:none;">
            <h2>第三步：计算结果</h2>

            <div class="result-block">
                <h3>准则层权重计算</h3>
                <div id="criteria-weights-result"></div>
            </div>

            <div class="result-block">
                <h3>准则层一致性检验</h3>
                <div id="criteria-consistency-result"></div>
            </div>

            <div class="result-block">
                <h3>方案层权重计算（各准则下）</h3>
                <div id="alternatives-weights-result"></div>
            </div>

            <div class="result-block">
                <h3>层次总排序</h3>
                <div id="total-ranking-result"></div>
            </div>

            <div class="result-block">
                <h3>层次总排序一致性检验</h3>
                <div id="total-consistency-result"></div>
            </div>

            <div class="result-block final-result">
                <h3>最终推荐结果</h3>
                <div id="final-result"></div>
            </div>
        </section>

        <footer>
            <p>层次分析法(AHP)在线计算工具 | 基于GitHub Pages免费部署</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
